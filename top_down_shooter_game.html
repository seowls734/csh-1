
<style>
  #game-wrap { display: flex; flex-direction: column; align-items: center; padding: 1rem 0; font-family: var(--font-mono, monospace); }
  #hud { display: flex; gap: 24px; margin-bottom: 10px; font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
  #hud span { display: flex; align-items: center; gap: 6px; }
  #canvas { display: block; cursor: crosshair; border-radius: 8px; background: #0a0e1a; border: 0.5px solid var(--color-border-tertiary); }
  #controls { margin-top: 10px; font-size: 12px; color: var(--color-text-secondary); display: flex; gap: 20px; }
  #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10,14,26,0.88); border-radius: 8px; }
  #canvas-wrap { position: relative; }
  .overlay-title { font-size: 28px; font-weight: 500; color: #e8f4ff; letter-spacing: 2px; margin-bottom: 8px; }
  .overlay-sub { font-size: 13px; color: #8aabcc; margin-bottom: 20px; }
  .overlay-btn { background: #1a3a5c; color: #7bc8ff; border: 1px solid #2a5a8c; padding: 10px 28px; border-radius: 6px; font-size: 14px; font-family: monospace; cursor: pointer; letter-spacing: 1px; transition: background 0.15s; }
  .overlay-btn:hover { background: #2a5a8c; }
  .overlay-score { font-size: 16px; color: #aaccee; margin-bottom: 6px; }
  .wave-banner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 32px; font-weight: 500; color: #ffcc55; letter-spacing: 4px; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
</style>
<div id="game-wrap">
  <div id="hud">
    <span>❤️ <span id="lives">3</span></span>
    <span>⭐ <span id="score">0</span></span>
    <span>🌊 WAVE <span id="wave">1</span></span>
    <span>🔥 AMMO <span id="ammo">∞</span></span>
  </div>
  <div id="canvas-wrap">
    <canvas id="canvas" width="600" height="480"></canvas>
    <div id="overlay">
      <div class="overlay-title">⚔ SURVIVAL SHOOTER</div>
      <div class="overlay-sub">WASD 이동 · 마우스 조준 및 클릭/홀드 사격</div>
      <button class="overlay-btn" id="start-btn">게임 시작</button>
    </div>
    <div class="wave-banner" id="wave-banner"></div>
  </div>
  <div id="controls">
    <span>WASD / 방향키 이동</span>
    <span>마우스 클릭/홀드 사격</span>
    <span>적을 처치해 웨이브를 돌파하라!</span>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let state = 'menu';
let score = 0, lives = 3, wave = 1;
let player, bullets, enemies, particles, powerups;
let keys = {}, mouse = {x: W/2, y: H/2, down: false};
let lastShot = 0, shootInterval = 160;
let waveTimer = 0, waveSpawnMax = 0, waveSpawned = 0;
let animId;
let lastTime = 0;
let waveBannerEl = document.getElementById('wave-banner');

function initGame() {
  score = 0; lives = 3; wave = 1;
  player = { x: W/2, y: H/2, r: 14, angle: 0, speed: 3, invincible: 0, trail: [] };
  bullets = []; enemies = []; particles = []; powerups = [];
  updateHUD();
  startWave();
}

function startWave() {
  waveSpawnMax = 5 + wave * 3;
  waveSpawned = 0;
  waveTimer = 0;
  showWaveBanner('WAVE ' + wave);
}

function showWaveBanner(txt) {
  waveBannerEl.textContent = txt;
  waveBannerEl.style.opacity = '1';
  setTimeout(() => { waveBannerEl.style.opacity = '0'; }, 1800);
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('wave').textContent = wave;
}

function spawnEnemy() {
  let side = Math.floor(Math.random()*4);
  let x, y;
  if(side===0){x=Math.random()*W;y=-20;}
  else if(side===1){x=W+20;y=Math.random()*H;}
  else if(side===2){x=Math.random()*W;y=H+20;}
  else{x=-20;y=Math.random()*H;}
  let tier = wave <= 2 ? 0 : wave <= 4 ? (Math.random()<0.3?1:0) : (Math.random()<0.2?2:Math.random()<0.4?1:0);
  enemies.push({
    x, y,
    r: [14,20,28][tier],
    hp: [1,3,6][tier],
    maxhp: [1,3,6][tier],
    speed: [1.8+wave*0.15, 1.2+wave*0.1, 0.8+wave*0.08][tier],
    tier,
    angle: 0
  });
}

function spawnParticle(x, y, color, count=8, speed=3, life=30) {
  for(let i=0;i<count;i++){
    let a = Math.random()*Math.PI*2;
    let s = (Math.random()*0.5+0.5)*speed;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life,color,r:Math.random()*3+1});
  }
}

canvas.addEventListener('mousemove', e => {
  let rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});
canvas.addEventListener('mousedown', e => { mouse.down = true; e.preventDefault(); });
canvas.addEventListener('mouseup', () => { mouse.down = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function shoot(now) {
  if(now - lastShot < shootInterval) return;
  lastShot = now;
  let angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  let spread = 0;
  bullets.push({ x: player.x + Math.cos(angle)*18, y: player.y + Math.sin(angle)*18, vx: Math.cos(angle+spread)*10, vy: Math.sin(angle+spread)*10, life: 50 });
  spawnParticle(player.x + Math.cos(angle)*18, player.y + Math.sin(angle)*18, '#ffdd55', 3, 2, 12);
}

function update(now) {
  let dt = Math.min((now - lastTime) / 16.67, 3);
  lastTime = now;

  if(state !== 'playing') return;

  // Player move
  let dx=0, dy=0;
  if(keys['a']||keys['arrowleft']) dx -= 1;
  if(keys['d']||keys['arrowright']) dx += 1;
  if(keys['w']||keys['arrowup']) dy -= 1;
  if(keys['s']||keys['arrowdown']) dy += 1;
  if(dx&&dy){dx*=0.707;dy*=0.707;}
  player.x = Math.max(player.r, Math.min(W-player.r, player.x + dx*player.speed*dt));
  player.y = Math.max(player.r, Math.min(H-player.r, player.y + dy*player.speed*dt));
  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  player.invincible = Math.max(0, player.invincible - dt);

  player.trail.push({x:player.x, y:player.y});
  if(player.trail.length > 12) player.trail.shift();

  if(mouse.down) shoot(now);

  // Bullets
  bullets = bullets.filter(b => {
    b.x += b.vx*dt; b.y += b.vy*dt; b.life -= dt;
    return b.life > 0 && b.x > -10 && b.x < W+10 && b.y > -10 && b.y < H+10;
  });

  // Wave spawning
  waveTimer += dt;
  let spawnRate = Math.max(30, 80 - wave*5);
  if(waveSpawned < waveSpawnMax && waveTimer > spawnRate/60*16.67) {
    spawnEnemy(); waveSpawned++; waveTimer = 0;
  }

  // Check wave clear
  if(waveSpawned >= waveSpawnMax && enemies.length === 0) {
    wave++;
    if(wave > 10) { endGame(true); return; }
    updateHUD();
    setTimeout(() => startWave(), 1200);
  }

  // Enemies
  enemies = enemies.filter(e => {
    let ex = player.x - e.x, ey = player.y - e.y;
    let dist = Math.sqrt(ex*ex+ey*ey);
    e.x += (ex/dist)*e.speed*dt;
    e.y += (ey/dist)*e.speed*dt;
    e.angle += 0.05*dt;
    return e.hp > 0;
  });

  // Bullet-enemy collision
  bullets.forEach((b, bi) => {
    enemies.forEach((e, ei) => {
      let dx = b.x-e.x, dy = b.y-e.y;
      if(Math.sqrt(dx*dx+dy*dy) < e.r+4) {
        e.hp--;
        b.life = 0;
        spawnParticle(e.x, e.y, ['#ff6644','#ff9922','#ff4488'][e.tier], 5, 2.5, 20);
        if(e.hp <= 0) {
          let pts = [10,30,80][e.tier];
          score += pts * wave;
          spawnParticle(e.x, e.y, ['#ffdd55','#ff9922','#ff4466'][e.tier], 16, 4, 40);
          updateHUD();
        }
      }
    });
  });
  enemies = enemies.filter(e => e.hp > 0);

  // Player-enemy collision
  if(player.invincible <= 0) {
    enemies.forEach(e => {
      let dx = player.x-e.x, dy = player.y-e.y;
      if(Math.sqrt(dx*dx+dy*dy) < player.r + e.r - 4) {
        lives--;
        player.invincible = 120;
        spawnParticle(player.x, player.y, '#55aaff', 14, 4, 35);
        updateHUD();
        if(lives <= 0) { endGame(false); }
      }
    });
  }

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx*dt; p.y += p.vy*dt;
    p.vx *= 0.92; p.vy *= 0.92;
    p.life -= dt;
    return p.life > 0;
  });
}

function draw() {
  ctx.clearRect(0,0,W,H);

  // Background grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Player trail
  player.trail.forEach((t, i) => {
    let a = (i/player.trail.length)*0.18;
    ctx.beginPath();
    ctx.arc(t.x, t.y, player.r*0.5*(i/player.trail.length), 0, Math.PI*2);
    ctx.fillStyle = `rgba(80,160,255,${a})`;
    ctx.fill();
  });

  // Bullets
  bullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
    ctx.fillStyle = '#ffe566';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(b.x - b.vx*0.4, b.y - b.vy*0.4, 2.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,200,80,0.4)';
    ctx.fill();
  });

  // Enemies
  enemies.forEach(e => {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(e.angle);
    let colors = [['#cc3322','#ff6655'],['#bb2266','#ff44aa'],['#882200','#dd4400']];
    let [dark, bright] = colors[e.tier];
    // Body
    if(e.tier === 0) {
      ctx.beginPath();
      for(let i=0;i<6;i++){
        let a = (i/6)*Math.PI*2;
        let r = i%2===0 ? e.r : e.r*0.65;
        i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
      }
      ctx.closePath();
      ctx.fillStyle = dark; ctx.fill();
      ctx.strokeStyle = bright; ctx.lineWidth = 2; ctx.stroke();
    } else if(e.tier === 1) {
      ctx.beginPath();
      ctx.arc(0,0,e.r,0,Math.PI*2);
      ctx.fillStyle = dark; ctx.fill();
      ctx.strokeStyle = bright; ctx.lineWidth = 2.5; ctx.stroke();
      for(let i=0;i<4;i++){
        let a = i*Math.PI/2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*e.r*0.5,Math.sin(a)*e.r*0.5);
        ctx.lineTo(Math.cos(a)*e.r,Math.sin(a)*e.r);
        ctx.strokeStyle=bright; ctx.lineWidth=3; ctx.stroke();
      }
    } else {
      ctx.beginPath();
      for(let i=0;i<8;i++){
        let a=(i/8)*Math.PI*2;
        let r=i%2===0?e.r:e.r*0.7;
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      ctx.closePath();
      ctx.fillStyle=dark; ctx.fill();
      ctx.strokeStyle=bright; ctx.lineWidth=3; ctx.stroke();
    }
    // HP bar
    if(e.maxhp > 1) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(-e.r, -e.r-10, e.r*2, 5);
      ctx.fillStyle = e.hp/e.maxhp > 0.5 ? '#44cc55' : '#ffaa22';
      ctx.fillRect(-e.r, -e.r-10, e.r*2*(e.hp/e.maxhp), 5);
    }
    ctx.restore();
  });

  // Player
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);
  let alpha = player.invincible > 0 ? (Math.sin(player.invincible*0.5)>0?0.4:1) : 1;
  ctx.globalAlpha = alpha;
  // Body
  ctx.beginPath();
  ctx.moveTo(16,0);ctx.lineTo(-10,10);ctx.lineTo(-6,0);ctx.lineTo(-10,-10);ctx.closePath();
  ctx.fillStyle = '#1a3a6c'; ctx.fill();
  ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 2; ctx.stroke();
  // Gun
  ctx.beginPath();
  ctx.rect(8,-3,12,6);
  ctx.fillStyle='#336699'; ctx.fill();
  ctx.strokeStyle='#55aaff'; ctx.lineWidth=1.5; ctx.stroke();
  // Cockpit
  ctx.beginPath();
  ctx.arc(2,0,5,0,Math.PI*2);
  ctx.fillStyle='#66ccff'; ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();

  // Particles
  particles.forEach(p => {
    let a = p.life/p.maxLife;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r*a, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = a;
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Vignette
  let grad = ctx.createRadialGradient(W/2,H/2,H*0.35,W/2,H/2,H*0.75);
  grad.addColorStop(0,'transparent');
  grad.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
}

function endGame(win) {
  state = 'over';
  cancelAnimationFrame(animId);
  let overlay = document.getElementById('overlay');
  overlay.innerHTML = `
    <div class="overlay-title">${win ? '🏆 클리어!' : '💀 GAME OVER'}</div>
    <div class="overlay-score">최종 점수: ${score}</div>
    <div class="overlay-sub">웨이브 ${wave} ${win?'전부 클리어!':'에서 종료'}</div>
    <button class="overlay-btn" id="start-btn">다시 시작</button>`;
  overlay.style.display = 'flex';
  document.getElementById('start-btn').onclick = startGame;
}

function loop(now) {
  update(now);
  draw();
  animId = requestAnimationFrame(loop);
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  state = 'playing';
  lastTime = performance.now();
  initGame();
  cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

document.getElementById('start-btn').onclick = startGame;
</script>
